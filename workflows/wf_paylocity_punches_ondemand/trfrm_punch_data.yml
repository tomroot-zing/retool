  query: |
    let result = []
    qry_punch_data.data?.map(employee => {
      employee?.map(punch => {
        punch?.segments.map(segment => {
          let detail = {}
          detail.paylocity_id = punch.employeeId
          detail.start_time = segment?.relativeStart
          detail.end_time= segment?.relativeEnd
          detail.punch_origin = segment?.origin
          detail.duration = segment?.durationSeconds/3600
          detail.dept_id = segment?.costCenters[2]?.code
          detail.dept_name = segment?.costCenters[2]?.name
          result.push(detail)
        })
      })
    })
    return result;
